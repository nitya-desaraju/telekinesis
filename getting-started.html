<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GETTING STARTED | TELEKINESIS</title>
    <style>
        :root {
            --bg-color: #111111; 
            --accent: #00ff41;
            --accent-pink: #ff00ff;
            --accent-cyan: #00ffff;
            --accent-yellow: #f0ff00;
            --text-dim: #888;
        }

        html { scroll-behavior: smooth; }
        body {
            background-color: var(--bg-color);
            margin: 0;
            font-family: 'Courier New', monospace;
            color: white;
            overflow-x: hidden;
        }

        nav {
            position: fixed;
            top: 20px;
            right: 30px;
            width: 40%;
            height: 50px;
            z-index: 3000;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 50px;
            border: 1px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }

        nav a {
            color: var(--accent);
            text-decoration: none;
            font-size: 2rem;
            letter-spacing: 2px;
            font-weight: bold;
        }

        nav a:hover { text-shadow: 0 0 8px var(--accent-pink); color: var(--accent-pink); }

        .scanlines::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2000; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        section {
            min-height: 100vh;
            padding: 100px 10% 50px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .hero-logo { width: 80%; animation: logo-glitch 4s linear infinite; }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 50px;
            text-align: center;
        }

        .card {
            border: 1px solid #333;
            padding: 20px;
            background: #0a0a0a;
            transition: 0.3s;
        }

        .card:first-child:hover { border-color: var(--accent-cyan); box-shadow: 0 0 10px var(--accent-cyan); }
        .card:last-child:hover { border-color: var(--accent-pink); box-shadow: 0 0 10px var(--accent-pink); }

        .shards-flow {
            margin: 40px 0;
            font-size: 1.2rem;
            color: var(--accent-yellow);
            text-shadow: 0 0 10px var(--accent-yellow);
        }

        .scroller-container {
            width: 100%;
            overflow: hidden;
            background: #050505;
            padding: 40px 0;
            border-top: 1px solid #222;
            border-bottom: 1px solid #222;
        }

        .scroller-inner {
            display: flex;
            gap: 20px;
            width: max-content;
            animation: scroll 10s linear infinite;
        }

        @keyframes scroll { 
            from { transform: translateX(0); }
            to { transform: translateX(-50%); } 
        }

        .prize-box {
            width: 200px; 
            height: 200px; 
            background: #111;
            border: 1px solid #333; 
            display: flex; 
            align-items: center;
            justify-content: center; 
            flex-direction: column;
            color: var(--accent-cyan);
            padding: 10px;
            flex-shrink: 0;
        }

        .prize-caption {
            margin-top: 10px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-cyan);
            opacity: 0.8;
        }

        .input-types {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .input-placeholder {
            width: 250px; height: 200px; background: #1a1a1a;
            border: 2px dashed #444; display: flex;
            align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .input-placeholder:hover { border-color: var(--accent-yellow); color: var(--accent-yellow); }

        @keyframes logo-glitch {
            0%, 88%, 93%, 95% { opacity: 1; }
            90% { opacity: 0.7; }
            94% { opacity: 0.4; }
        }

        .hc-badge-anchor { position: fixed; top: -10px; left: 30px; z-index: 3000; transition: 0.25s; }
        .hc-badge-anchor:hover { transform: translateY(10px); }

        .terminal-input {
            background: #000; border: 2px solid #333; color: var(--accent);
            padding: 15px; width: 300px; font-family: inherit;
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 0.9rem;
            color: var(--text-dim);
            border-top: 1px solid #222;
        }

        .docs-container { 
            display: flex; 
            max-width: 1200px; 
            margin: 100px auto; 
            gap: 50px; 
            padding: 0 20px; 
        }

        .sidebar { 
            position: sticky; 
            top: 100px; 
            min-width: 200px; 
            height: fit-content; 
            border-left: 2px solid var(--accent); 
            padding-left: 20px; 
        }

        .sidebar a { 
            display: block; 
            color: white; 
            text-decoration: none; 
            margin-bottom: 15px; 
            font-weight: bold; 
        }

        .sidebar a:hover { 
            color: var(--accent-pink); 
        }

        .content-section { 
            margin-bottom: 100px; 
            width: 100%; 
        }

        h2 { 
            color: var(--accent-cyan); 
            border-bottom: 1px solid #333; 
            padding-bottom: 10px; 
        }
    </style>
</head>

</html>
